<script>
const METRIC_DEFS = {
  exposure: {
    label: "曝光",
    aliases: ["直播间曝光人数", "曝光人数", "impressions", "live impressions", "exposure"],
  },
  coverClickRate: {
    label: "封面点击率",
    aliases: ["封面点击率", "点击率", "cover ctr", "ctr"],
    percent: true,
  },
  viewers: {
    label: "看播UV",
    aliases: ["直播间观看人数", "观看人数", "看播人数", "viewers", "unique viewers", "uv"],
  },
  views: {
    label: "场观",
    aliases: ["直播间观看次数", "观看次数", "场观", "views", "live views"],
  },
  avgWatchSeconds: {
    label: "平均停留秒",
    aliases: ["人均观看时长(秒)", "人均停留时长(秒)", "平均停留时长", "avg watch time", "average watch time"],
  },
  interactions: {
    label: "互动人数",
    aliases: ["互动人数", "互动用户数", "engaged viewers", "interactions"],
  },
  engagementRate: {
    label: "互动率",
    aliases: ["观看-互动率(人数)", "互动率", "engagement rate"],
    percent: true,
  },
  avgOnline: {
    label: "平均在线",
    aliases: ["平均在线人数", "avg online", "average online viewers"],
  },
  gmv: {
    label: "GMV",
    aliases: ["支付金额", "成交金额", "支付金额（商家实收)", "支付金额（商家实收）", "gmv", "paid amount", "sales amount"],
  },
  buyers: {
    label: "支付人数",
    aliases: ["支付人数", "购买人数", "buyers", "paying users"],
  },
  orders: {
    label: "支付订单",
    aliases: ["支付订单数", "订单数", "orders", "paid orders"],
  },
  aov: {
    label: "客单价",
    aliases: ["客单价", "aov", "average order value"],
  },
  fans: {
    label: "涨粉",
    aliases: ["新增粉丝人数", "涨粉", "new followers", "followers gained"],
  },
  productClicks: {
    label: "商品点击",
    aliases: ["商品点击人数", "商品点击次数", "商品浏览人数", "商品浏览次数", "商详浏览次数", "product clicks", "click product"],
  },
  productExposure: {
    label: "商品曝光",
    aliases: ["商品曝光人数", "商品曝光次数", "product impressions", "product exposure"],
  },
  likes: {
    label: "点赞",
    aliases: ["点赞次数", "点赞人数", "likes"],
  },
  comments: {
    label: "评论",
    aliases: ["评论次数", "评论人数", "comments"],
  },
  firstPurchaseRate: {
    label: "首购率",
    aliases: ["首购率", "first purchase rate"],
    percent: true,
  },
  refunds: {
    label: "退款金额",
    aliases: ["退款金额", "refund amount", "refunds"],
  },
  refundOrders: {
    label: "退款订单",
    aliases: ["退款订单数", "refund orders"],
  },
  refundUsers: {
    label: "退款人数",
    aliases: ["退款人数", "refund users"],
  },
  refundRate: {
    label: "退款率",
    aliases: ["退款率", "refund rate"],
    percent: true,
  },
};

function normalizeKey(value) {
  return String(value ?? "")
    .normalize("NFKC")
    .replace(/\s+/g, "")
    .replace(/[()（）]/g, "")
    .replace(/[：:]/g, "")
    .toLowerCase();
}

function toNumber(value) {
  if (value == null || value === "") return null;
  const text = String(value).replace(/[,，￥¥%\s]/g, "");
  const num = Number.parseFloat(text);
  return Number.isFinite(num) ? num : null;
}

function asPercent(value) {
  const num = toNumber(value);
  if (num == null) return null;
  const percent = num <= 1 ? num * 100 : num;
  return Math.round(percent * 100) / 100;
}

function cleanRows(rows = []) {
  return rows
    .map((row) => Array.from(row || []))
    .filter((row) => row.some((cell) => cell != null && String(cell).trim() !== ""));
}

const EXPLICIT_TOPIC_KEYWORDS = ["直播主题", "直播标题", "直播名称", "场次主题", "场次标题", "活动名称", "专场名称", "主题名称"];
const TOPIC_CANDIDATE_KEYWORDS = ["笔记标题", "商品标题", "商品推荐语", "主题", "标题", "直播名称", "直播标题", "活动", "专场"];

function detectPlatform(workbookNames = [], sheetNames = []) {
  const joined = [...workbookNames, ...sheetNames].join(" ").toLowerCase();
  if (/抖音|巨量|douyin|tiktok|tik tok/.test(joined)) return "douyin";
  if (/小红书|xhs|redbook|red book/.test(joined)) return "xiaohongshu";
  return "unknown";
}

function buildMetricAliasIndex(defs = METRIC_DEFS) {
  const index = new Map();
  for (const [key, def] of Object.entries(defs)) {
    for (const alias of [def.label, ...def.aliases]) {
      index.set(normalizeKey(alias), key);
    }
  }
  return index;
}

function matchMetric(columnName, defs = METRIC_DEFS) {
  const norm = normalizeKey(columnName);
  if (!norm) return null;
  const index = buildMetricAliasIndex(defs);
  if (index.has(norm)) return { key: index.get(norm), confidence: 1, via: "exact" };
  for (const [alias, key] of index.entries()) {
    if (norm.includes(alias) || (norm.length >= 2 && alias.includes(norm))) {
      return { key, confidence: 0.76, via: "contains" };
    }
  }
  return null;
}

function findHeaderRow(rows, requiredSignals = ["观看", "gmv", "支付", "view"]) {
  const limit = Math.min(rows.length, 12);
  let best = { index: -1, score: 0 };
  for (let i = 0; i < limit; i += 1) {
    const row = rows[i] || [];
    const score = row.reduce((sum, cell) => {
      const normalized = normalizeKey(cell);
      const matchedMetric = matchMetric(normalized);
      const matchedSignal = requiredSignals.some((signal) => normalized.includes(normalizeKey(signal)));
      return sum + (matchedMetric ? 2 : 0) + (matchedSignal ? 1 : 0);
    }, 0);
    if (score > best.score) best = { index: i, score };
  }
  return best.score >= 2 ? best.index : -1;
}

function parseCoreMetrics(rows) {
  const cleaned = cleanRows(rows);
  const vertical = parseVerticalMetrics(cleaned);
  if (vertical.matched.length >= 3) return vertical;

  const headerIndex = findHeaderRow(cleaned);
  if (headerIndex < 0 || !cleaned[headerIndex + 1]) {
    return { metrics: {}, matched: [], missing: Object.keys(METRIC_DEFS), headerIndex: -1, layout: "unknown" };
  }
  const header = cleaned[headerIndex];
  const values = cleaned[headerIndex + 1];
  const metrics = {};
  const matched = [];
  header.forEach((column, index) => {
    const hit = matchMetric(column);
    if (!hit) return;
    const def = METRIC_DEFS[hit.key];
    const value = def.percent ? asPercent(values[index]) : toNumber(values[index]);
    if (value == null) return;
    metrics[hit.key] = value;
    matched.push({ metric: hit.key, column: String(column), value, confidence: hit.confidence, via: hit.via });
  });
  const missing = Object.keys(METRIC_DEFS).filter((key) => metrics[key] == null);
  return { metrics, matched, missing, headerIndex, layout: "wide" };
}

function parseVerticalMetrics(rows) {
  const cleaned = cleanRows(rows);
  const metrics = {};
  const matched = [];

  for (const row of cleaned) {
    for (let index = 0; index < row.length - 1; index += 1) {
      const hit = matchMetric(row[index]);
      if (!hit) continue;
      const def = METRIC_DEFS[hit.key];
      const value = def.percent ? asPercent(row[index + 1]) : toNumber(row[index + 1]);
      if (value == null) continue;
      metrics[hit.key] = value;
      matched.push({ metric: hit.key, column: String(row[index]), value, confidence: hit.confidence, via: hit.via });
    }
  }

  const missing = Object.keys(METRIC_DEFS).filter((key) => metrics[key] == null);
  return { metrics, matched, missing, headerIndex: -1, layout: matched.length ? "vertical" : "unknown" };
}

function deriveMetrics(metrics) {
  const out = { ...metrics };
  if (out.avgWatchSeconds != null) out.avgWatchMinutes = out.avgWatchSeconds / 60;
  if (out.gmv != null && out.buyers) out.aovDerived = out.gmv / out.buyers;
  if (out.buyers != null && out.viewers) out.payConversionRate = (out.buyers / out.viewers) * 100;
  if (out.views != null && out.exposure) out.enterRate = (out.views / out.exposure) * 100;
  if (out.productClicks != null && out.viewers) out.productClickRate = (out.productClicks / out.viewers) * 100;
  if (out.productClicks != null && out.productExposure) out.productCtr = (out.productClicks / out.productExposure) * 100;
  if (out.refundRate == null && out.refunds != null && out.gmv) out.refundRate = (out.refunds / out.gmv) * 100;
  return out;
}

function rowsToRecords(rows, requiredSignals = ["商品", "渠道", "支付", "观看", "曝光"]) {
  const cleaned = cleanRows(rows);
  const headerIndex = findHeaderRow(cleaned, requiredSignals);
  if (headerIndex < 0) return [];
  const headers = cleaned[headerIndex].map((cell) => String(cell ?? "").trim());
  return cleaned.slice(headerIndex + 1).map((row) => {
    const record = {};
    headers.forEach((header, index) => {
      if (!header) return;
      record[header] = row[index];
    });
    return record;
  });
}

function pickValue(record, aliases) {
  const aliasSet = aliases.map(normalizeKey);
  for (const [key, value] of Object.entries(record || {})) {
    const norm = normalizeKey(key);
    if (aliasSet.some((alias) => norm === alias || norm.includes(alias) || alias.includes(norm))) {
      return value;
    }
  }
  return null;
}

function recordKey(record, aliases) {
  const aliasSet = aliases.map(normalizeKey);
  return Object.keys(record || {}).find((key) => {
    const norm = normalizeKey(key);
    return aliasSet.some((alias) => norm === alias || norm.includes(alias) || alias.includes(norm));
  });
}

function fillDownGroup(records, aliases = ["分类方式", "category"]) {
  let lastGroup = "";
  return records.map((record) => {
    const key = recordKey(record, aliases);
    if (!key) return record;
    const value = record[key];
    if (value != null && String(value).trim() !== "") {
      lastGroup = String(value).trim();
      return record;
    }
    if (!lastGroup) return record;
    return { ...record, [key]: lastGroup };
  });
}

function classifyProduct(name = "") {
  const text = String(name);
  if (/课程|报告解读|调理课|筛查表|自查清单|手册|服务|1v1|解读/.test(text)) {
    if (/清单|筛查表|自查|手册/.test(text) && !/课程|服务|报告解读/.test(text)) return "lead_magnet";
    if (/服务|1v1|解读/.test(text)) return "service";
    return "course";
  }
  if (/镁|维生素|益生|益生元|膳食纤维|辅酶|鱼油|牛肝|营养|胶囊|片|粉|小檗碱|黄连素|DAO|纳豆|生酮|电解质/.test(text)) {
    return "supplement";
  }
  if (/书|出版社|超级肠道/.test(text)) return "book";
  return "other";
}

function parseProducts(rows, limit = 200) {
  const records = rowsToRecords(rows);
  return records
    .map((record) => {
      const name = pickValue(record, ["商品名称", "商品标题", "product name", "title"]);
      if (!name) return null;
      const paidAmount = toNumber(pickValue(record, ["支付金额（商家实收）", "支付金额", "成交金额", "gmv"]));
      const paidUnits = toNumber(pickValue(record, ["支付商品件数", "支付件数", "支付订单数", "orders"]));
      const price = toNumber(pickValue(record, ["直播间价格", "商品价格", "到手价", "售价", "price"]));
      const exposure = toNumber(pickValue(record, ["商品曝光人数", "曝光人数", "impressions"]));
      const clicks = toNumber(pickValue(record, ["商品点击人数", "商详浏览次数", "商品点击次数", "product clicks"]));
      const refunds = toNumber(pickValue(record, ["退款金额", "refund"]));
      const clickRate = exposure && clicks != null ? (clicks / exposure) * 100 : null;
      const conversionRate = clicks && paidUnits != null ? (paidUnits / clicks) * 100 : null;
      return {
        name: String(name),
        role: classifyProduct(name),
        price,
        paidAmount,
        paidUnits,
        exposure,
        clicks,
        refunds,
        clickRate,
        conversionRate,
      };
    })
    .filter(Boolean)
    .sort((a, b) => (b.paidAmount || 0) - (a.paidAmount || 0))
    .slice(0, limit);
}

function classifyTrafficSource(source = "") {
  const text = String(source);
  if (/分享|群聊|消息|私信/.test(text)) return "share";
  if (/关注|粉丝/.test(text)) return "follower";
  if (/搜索|笔记|个人主页|视频|发现|推荐|直播广场|上下滑|开屏/.test(text)) return "public";
  if (/店铺|购物|订单/.test(text)) return "shop";
  return "other";
}

function parseTrafficSources(rows, limit = 200) {
  const records = fillDownGroup(rowsToRecords(rows));
  return records
    .map((record) => {
      const group = pickValue(record, ["分类方式", "category"]);
      const source = pickValue(record, ["渠道名称", "子项", "来源渠道", "source", "channel"]);
      if (!source) return null;
      if (group && !/来源|渠道/.test(String(group))) return null;
      if (!isTrafficName(source)) return null;
      const views = toNumber(pickValue(record, ["观看次数", "views"]));
      const viewers = toNumber(pickValue(record, ["观看人数", "viewers"]));
      const avgWatchSeconds = toNumber(pickValue(record, ["人均观看时长（秒）", "人均观看时长(秒)", "avg watch"]));
      const paidAmount = toNumber(pickValue(record, ["支付金额", "支付金额（商家实收）", "gmv"]));
      const orders = toNumber(pickValue(record, ["支付订单数", "orders"]));
      const buyers = toNumber(pickValue(record, ["支付人数", "buyers"]));
      const explicitGpm = toNumber(pickValue(record, ["千次观看成交", "千次观看成交金额", "gpm"]));
      const gpm = explicitGpm ?? (views ? (paidAmount || 0) / views * 1000 : null);
      const payConversionRate = viewers && buyers != null ? buyers / viewers * 100 : null;
      const trafficShare = asPercent(pickValue(record, ["流量占比", "观看占比", "traffic share"]));
      const amountShare = asPercent(pickValue(record, ["金额占比", "成交占比", "amount share"]));
      return {
        source: String(source),
        sourceType: classifyTrafficSource(source),
        views,
        viewers,
        avgWatchSeconds,
        paidAmount,
        orders,
        buyers,
        gpm,
        payConversionRate,
        trafficShare,
        amountShare,
      };
    })
    .filter(Boolean)
    .sort((a, b) => (b.paidAmount || 0) - (a.paidAmount || 0))
    .slice(0, limit);
}

function isTrafficName(source = "") {
  return /分享|群聊|消息|关注|发现|搜索|笔记|个人主页|视频|直播广场|上下滑|开屏|店铺|购物|订单|其他/.test(String(source));
}

function parseAudienceSegments(rows, limit = 300) {
  const records = fillDownGroup(rowsToRecords(rows));
  return records
    .map((record) => {
      const group = pickValue(record, ["分类方式", "category"]);
      const segment = pickValue(record, ["子项", "segment"]);
      const viewers = toNumber(pickValue(record, ["观看人数", "viewers"]));
      const buyers = toNumber(pickValue(record, ["支付人数", "buyers"]));
      const paidAmount = toNumber(pickValue(record, ["支付金额（商家实收）", "支付金额", "gmv"]));
      if (!segment) return null;
      return {
        group: String(group || "未分组"),
        segment: String(segment),
        viewers,
        buyers,
        paidAmount,
        payConversionRate: viewers && buyers != null ? buyers / viewers * 100 : null,
      };
    })
    .filter(Boolean)
    .sort((a, b) => (b.paidAmount || 0) - (a.paidAmount || 0))
    .slice(0, limit);
}

function extractBasicInfo(rows) {
  const cleaned = cleanRows(rows);
  const headerIndex = cleaned.findIndex((row) => row.some((cell) => /开播账号|开播时间|直播时长/.test(String(cell ?? ""))));
  const headers = headerIndex >= 0 ? cleaned[headerIndex].map((cell) => String(cell ?? "").trim()) : [];
  const values = headerIndex >= 0 ? cleaned[headerIndex + 1] || [] : [];
  const first = {};
  headers.forEach((header, index) => {
    if (header) first[header] = values[index];
  });
  return {
    accountName: stringOrEmpty(pickValue(first, ["开播账号名称", "账号名称", "account name"])),
    accountId: stringOrEmpty(pickValue(first, ["开播账号ID", "小红书号", "account id"])),
    startTime: stringOrEmpty(pickValue(first, ["开播时间", "start time", "date"])),
    durationMinutes: toNumber(pickValue(first, ["直播时长（分钟）", "直播时长", "duration"])),
  };
}

function parseLeadNotes(rows, limit = 300) {
  const records = rowsToRecords(rows, ["笔记", "引流", "阅读", "观播", "支付"]);
  return records
    .map((record) => {
      const title = pickValue(record, ["笔记标题", "标题", "note title", "content title"]);
      const noteId = pickValue(record, ["笔记ID", "笔记id", "note id"]);
      if (!title && !noteId) return null;
      const reads = toNumber(pickValue(record, ["笔记阅读数", "阅读数", "reads"]));
      const viewCount = toNumber(pickValue(record, ["引流观播次数", "引流观看次数", "live views"]));
      const viewers = toNumber(pickValue(record, ["引流观看人数", "观看人数", "viewers"]));
      const paidAmount = toNumber(pickValue(record, ["引流支付金额", "支付金额", "gmv"]));
      const paidUnits = toNumber(pickValue(record, ["引流支付件数", "支付件数"]));
      const orders = toNumber(pickValue(record, ["引流支付订单数", "支付订单数", "orders"]));
      const readToViewRate = asPercent(pickValue(record, ["阅读-观播率（次数）", "阅读-观播率(次数)", "阅读观播率", "read to view rate"]));
      const viewToPayConversionRate = asPercent(pickValue(record, ["观看-支付转化率（次数）", "观看-支付转化率(次数)", "观播支付转化率", "view to pay rate"]));
      return {
        noteId: stringOrEmpty(noteId),
        title: stringOrEmpty(title),
        authorName: stringOrEmpty(pickValue(record, ["作者名称", "作者", "author"])),
        authorId: stringOrEmpty(pickValue(record, ["作者小红书号", "作者ID", "author id"])),
        publishedAt: stringOrEmpty(pickValue(record, ["发布时间", "publish time", "published at"])),
        isPreviewLinked: stringOrEmpty(pickValue(record, ["是否关联预告", "关联预告"])),
        reads,
        viewCount,
        viewers,
        paidAmount,
        paidUnits,
        orders,
        readToViewRate,
        viewToPayConversionRate,
      };
    })
    .filter(Boolean)
    .sort((a, b) => (b.paidAmount || 0) - (a.paidAmount || 0) || (b.viewers || 0) - (a.viewers || 0))
    .slice(0, limit);
}

function topAudienceSegmentsBySession(sessions = [], groupPattern, limit = 3) {
  const pattern = groupPattern instanceof RegExp ? groupPattern : new RegExp(String(groupPattern || ""));
  return sessions
    .map((session) => {
      const rows = (session.audienceSegments || []).filter((segment) => pattern.test(String(segment.group || "")));
      const rankField = rows.some((row) => Number(row.paidAmount) > 0) ? "paidAmount" : "viewers";
      const ranked = [...rows]
        .sort(compareAudienceSegments)
        .slice(0, limit)
        .map((row) => ({ ...row, session, rankField }));
      return {
        session,
        rows: ranked,
        total: rows.length,
        rankField,
        maxValue: Math.max(1, ...ranked.map((row) => Number(row[rankField]) || 0)),
      };
    })
    .filter((group) => group.rows.length);
}

function topLeadNotesBySession(sessions = [], limit = 5) {
  return sessions
    .map((session) => {
      const rows = [...(session.leadNotes || [])];
      const rankField = rows.some((row) => Number(row.paidAmount) > 0)
        ? "paidAmount"
        : rows.some((row) => Number(row.viewers) > 0)
          ? "viewers"
          : rows.some((row) => Number(row.viewCount) > 0)
            ? "viewCount"
            : "reads";
      const ranked = rows
        .sort(compareLeadNotes)
        .slice(0, limit)
        .map((row) => ({ ...row, session, rankField }));
      return {
        session,
        rows: ranked,
        total: rows.length,
        rankField,
        maxValue: Math.max(1, ...ranked.map((row) => Number(row[rankField]) || 0)),
      };
    })
    .filter((group) => group.rows.length);
}

function compareAudienceSegments(a, b) {
  return (
    (Number(b.paidAmount) || 0) - (Number(a.paidAmount) || 0) ||
    (Number(b.viewers) || 0) - (Number(a.viewers) || 0) ||
    (Number(b.buyers) || 0) - (Number(a.buyers) || 0) ||
    String(a.segment || "").localeCompare(String(b.segment || ""), "zh-Hans-CN")
  );
}

function compareLeadNotes(a, b) {
  return (
    (Number(b.paidAmount) || 0) - (Number(a.paidAmount) || 0) ||
    (Number(b.viewers) || 0) - (Number(a.viewers) || 0) ||
    (Number(b.viewCount) || 0) - (Number(a.viewCount) || 0) ||
    (Number(b.reads) || 0) - (Number(a.reads) || 0) ||
    String(a.title || a.noteId || "").localeCompare(String(b.title || b.noteId || ""), "zh-Hans-CN")
  );
}

function auditTopicFields(rows, sheetName = "", sourceName = "") {
  const cleaned = cleanRows(rows);
  const explicit = [];
  const candidates = [];

  for (let rowIndex = 0; rowIndex < Math.min(cleaned.length, 200); rowIndex += 1) {
    const row = cleaned[rowIndex];
    for (let colIndex = 0; colIndex < row.length; colIndex += 1) {
      const cell = row[colIndex];
      const text = String(cell ?? "").trim();
      if (!text) continue;
      const kind = classifyTopicCell(text);
      if (!kind) continue;
      const value = topicValueForCell(row, colIndex, rowIndex, cleaned, kind);
      const hit = {
        kind,
        label: text,
        value: value == null ? "" : String(value),
        sheet: sheetName,
        sourceName,
        row: rowIndex + 1,
        column: colIndex + 1,
      };
      if (kind === "explicit") explicit.push(hit);
      else candidates.push(hit);
    }
  }

  return { explicit, candidates };
}

function classifyTopicCell(text) {
  const normalized = normalizeKey(text);
  if (EXPLICIT_TOPIC_KEYWORDS.some((keyword) => normalized.includes(normalizeKey(keyword)))) return "explicit";
  if (TOPIC_CANDIDATE_KEYWORDS.some((keyword) => normalized.includes(normalizeKey(keyword)))) return "candidate";
  return "";
}

function topicValueForCell(row, colIndex, rowIndex, rows, kind) {
  if (!isLikelyHeaderRow(row)) return row[colIndex];
  const below = rows[rowIndex + 1]?.[colIndex];
  if (below != null && String(below).trim() !== "") return below;
  if (kind === "explicit") {
    const sameRowNext = row[colIndex + 1];
    if (sameRowNext != null && String(sameRowNext).trim() !== "") return sameRowNext;
  }
  return "";
}

function isLikelyHeaderRow(row = []) {
  const labels = row.map((cell) => normalizeKey(cell)).filter(Boolean);
  if (labels.length < 2) return false;
  const headerHits = labels.filter((label) =>
    /id|名称|标题|时间|人数|次数|金额|订单|占比|点击率|转化率|价格|库存|作者|商品|笔记|渠道|分类方式|子项/.test(label),
  );
  return headerHits.length >= 2;
}

function stringOrEmpty(value) {
  return value == null ? "" : String(value);
}

function guessStreamId(name = "") {
  const text = String(name);
  const longId = text.match(/\d{12,}/);
  if (longId) return longId[0];
  const date = text.match(/20\d{2}[-_/年.]?\d{1,2}[-_/月.]?\d{1,2}/);
  if (date) return date[0].replace(/\D/g, "");
  return "";
}

function buildSessionsFromWorkbooks(workbooks = []) {
  const enriched = workbooks.map((workbook) => {
    const sheetNames = Object.keys(workbook.sheets || {});
    const basicRows = workbook.sheets?.基本信息 || workbook.sheets?.["Basic Info"];
    const basicInfo = basicRows ? extractBasicInfo(basicRows) : {};
    const overviewRows = workbook.sheets?.数据概览 || workbook.sheets?.["核心数据"] || workbook.sheets?.["Core Data"];
    const overview = overviewRows ? parseCoreMetrics(overviewRows) : { metrics: {} };
    return { ...workbook, sheetNames, basicInfo, overview, explicitStreamId: guessStreamId(workbook.name) };
  });

  const explicitAnchors = enriched.filter((item) => item.explicitStreamId);
  const groups = new Map();
  for (const workbook of enriched) {
    let streamId = workbook.explicitStreamId;
    if (!streamId) {
      const match = findBestAnchor(workbook, explicitAnchors);
      streamId = match?.explicitStreamId || `ungrouped:${workbook.name}`;
    }
    if (!groups.has(streamId)) groups.set(streamId, []);
    groups.get(streamId).push(workbook);
  }

  return Array.from(groups.entries()).map(([streamId, items]) => {
    const allSheetNames = items.flatMap((item) => Object.keys(item.sheets || {}));
    const platform = detectWorkbookPlatform(items, allSheetNames);
    const session = {
      id: `${platform}:${streamId}`,
      streamId,
      platform,
      sourceName: items.map((item) => item.name).join(" + "),
      files: items.map((item) => item.name),
      basicInfo: {},
      metrics: {},
      products: [],
      trafficSources: [],
      audienceSegments: [],
      leadNotes: [],
      topicAudit: {
        explicit: [],
        candidates: [],
        checkedSheets: [],
      },
      breakdowns: {
        products: [],
        traffic: [],
        audience: [],
        leadNotes: [],
      },
      importReport: {
        status: "needs_review",
        files: items.map((item) => item.name),
        recognizedSheets: [],
        ignoredSheets: [],
        core: { matched: [], missing: Object.keys(METRIC_DEFS), sheet: "", layout: "unknown" },
      },
      diagnosis: [],
    };

    for (const item of items) {
      for (const [sheetName, rows] of Object.entries(item.sheets || {})) {
        const sheetRef = `${item.name} / ${sheetName}`;
        const topicAudit = auditTopicFields(rows, sheetName, item.name);
        session.topicAudit.explicit.push(...withSource(topicAudit.explicit, sheetRef));
        session.topicAudit.candidates.push(...withSource(topicAudit.candidates, sheetRef));
        session.topicAudit.checkedSheets.push(sheetRef);
        if (isPrivacySheet(sheetName, rows)) {
          session.importReport.ignoredSheets.push({ kind: "privacy", sheet: sheetRef });
          continue;
        }
        if (/基本信息/.test(sheetName)) {
          session.basicInfo = { ...session.basicInfo, ...removeEmptyValues(extractBasicInfo(rows)) };
          session.importReport.recognizedSheets.push({ kind: "basic", sheet: sheetRef });
        }
        if (/核心数据|数据概览|overview|core/i.test(sheetName)) {
          const parsed = parseCoreMetrics(rows);
          if (parsed.matched.length) {
            session.metrics = { ...session.metrics, ...parsed.metrics };
            session.importReport.core = { ...parsed, sheet: sheetRef };
            session.importReport.recognizedSheets.push({ kind: "core", sheet: sheetRef });
          }
        }
        if (/商品分析|商品数据|商品明细|product/i.test(sheetName)) {
          const products = withSource(parseProducts(rows), sheetRef);
          if (products.length) {
            session.breakdowns.products.push(...products);
            session.products.push(...products);
            session.importReport.recognizedSheets.push({ kind: "product", sheet: sheetRef, rows: products.length });
          }
        }
        if (/流量渠道|推广流量|观众来源|traffic|channel/i.test(sheetName)) {
          const trafficSources = withSource(parseTrafficSources(rows), sheetRef);
          if (trafficSources.length) {
            session.breakdowns.traffic.push(...trafficSources);
            session.trafficSources.push(...trafficSources);
            session.importReport.recognizedSheets.push({ kind: "traffic", sheet: sheetRef, rows: trafficSources.length });
          }
          const audienceSegments = withSource(parseAudienceSegments(rows), sheetRef);
          if (audienceSegments.length) {
            session.breakdowns.audience.push(...audienceSegments);
            session.audienceSegments.push(...audienceSegments);
            session.importReport.recognizedSheets.push({ kind: "audience", sheet: sheetRef, rows: audienceSegments.length });
          }
        }
        if (/引流笔记|直播引流|笔记引流|lead|note/i.test(sheetName)) {
          const leadNotes = withSource(parseLeadNotes(rows), sheetRef);
          if (leadNotes.length) {
            session.breakdowns.leadNotes.push(...leadNotes);
            session.leadNotes.push(...leadNotes);
            session.importReport.recognizedSheets.push({ kind: "lead_note", sheet: sheetRef, rows: leadNotes.length });
          }
        }
      }
    }

    session.metrics = deriveMetrics(session.metrics);
    session.products = dedupeBy(session.products, "name")
      .sort((a, b) => (b.paidAmount || 0) - (a.paidAmount || 0))
      .slice(0, 200);
    session.trafficSources = dedupeBy(session.trafficSources, "source")
      .sort((a, b) => (b.paidAmount || 0) - (a.paidAmount || 0))
      .slice(0, 200);
    session.audienceSegments = session.audienceSegments
      .sort((a, b) => audienceGroupRank(a.group) - audienceGroupRank(b.group) || (b.paidAmount || 0) - (a.paidAmount || 0))
      .slice(0, 300);
    session.leadNotes = session.leadNotes
      .sort((a, b) => (b.paidAmount || 0) - (a.paidAmount || 0) || (b.viewers || 0) - (a.viewers || 0))
      .slice(0, 300);
    session.topicAudit.explicit = dedupeTopicHits(session.topicAudit.explicit);
    session.topicAudit.candidates = dedupeTopicHits(session.topicAudit.candidates).slice(0, 80);
    session.topic = session.topicAudit.explicit.find((hit) => hit.value)?.value || "";
    session.breakdowns.products = session.breakdowns.products.sort((a, b) => (b.paidAmount || 0) - (a.paidAmount || 0));
    session.breakdowns.traffic = session.breakdowns.traffic.sort((a, b) => (b.paidAmount || 0) - (a.paidAmount || 0));
    session.breakdowns.audience = session.audienceSegments;
    session.breakdowns.leadNotes = session.leadNotes;
    session.importReport.core.missing = Object.keys(METRIC_DEFS).filter((key) => session.metrics[key] == null);
    session.importReport.status = session.importReport.core.matched.length ? "recognized" : "needs_review";
    session.diagnosis = diagnoseSession(session.metrics);
    return session;
  });
}

function withSource(items, sourceSheet) {
  return items.map((item) => ({ ...item, sourceSheet }));
}

function audienceGroupRank(group = "") {
  if (/来源|渠道/.test(group)) return 1;
  if (/粉丝/.test(group)) return 2;
  if (/性别/.test(group)) return 3;
  if (/年龄/.test(group)) return 4;
  if (/地区|地域|省份|城市/.test(group)) return 5;
  return 9;
}

function isPrivacySheet(sheetName, rows) {
  const name = String(sheetName || "");
  if (/抽奖|通讯信息|中奖用户|收货|手机号|手机号码|地址/.test(name)) return true;
  const sample = cleanRows(rows).slice(0, 6).flat().join(" ");
  return /通讯信息|中奖用户|收货地址|手机号|手机号码|详细地址/.test(sample);
}

function detectWorkbookPlatform(items, sheetNames) {
  const explicit = detectPlatform(items.flatMap((item) => [item.name, item.container || ""]), sheetNames);
  if (explicit !== "unknown") return explicit;
  const joinedSheets = sheetNames.join(" ");
  if (/买手数据中心|数据概览|观众来源及画像|引流笔记|小红书号|薯钻/.test(joinedSheets)) return "xiaohongshu";
  const firstCells = items
    .flatMap((item) => Object.values(item.sheets || {}).flatMap((rows) => cleanRows(rows).slice(0, 4).flat()))
    .join(" ");
  if (/小红书号|薯钻|买手数据中心|观众来源及画像/.test(firstCells)) return "xiaohongshu";
  if (/抖音|巨量百应|电商罗盘|直播间成交|千川/.test(firstCells)) return "douyin";
  return "unknown";
}

function findBestAnchor(workbook, anchors) {
  const metrics = workbook.overview?.metrics || {};
  if (!Object.keys(metrics).length) return null;
  let best = null;
  for (const anchor of anchors) {
    const anchorMetrics = anchor.overview?.metrics || {};
    let score = 0;
    for (const key of ["viewers", "gmv", "buyers", "fans", "refunds"]) {
      if (metrics[key] == null || anchorMetrics[key] == null) continue;
      const diff = Math.abs(metrics[key] - anchorMetrics[key]);
      const tolerance = Math.max(1, Math.abs(anchorMetrics[key]) * 0.005);
      if (diff <= tolerance) score += key === "gmv" ? 3 : 2;
    }
    if (!best || score > best.score) best = { ...anchor, score };
  }
  return best && best.score >= 3 ? best : null;
}

function removeEmptyValues(obj) {
  return Object.fromEntries(Object.entries(obj).filter(([, value]) => value !== "" && value != null));
}

function dedupeBy(items, keyOrFn) {
  const keyFn = typeof keyOrFn === "function" ? keyOrFn : (item) => item[keyOrFn];
  const seen = new Set();
  const out = [];
  for (const item of items) {
    const key = keyFn(item);
    if (seen.has(key)) continue;
    seen.add(key);
    out.push(item);
  }
  return out;
}

function dedupeTopicHits(items) {
  return dedupeBy(items, (item) => `${item.kind}:${item.label}:${item.value}:${item.sourceSheet || item.sheet}:${item.row}:${item.column}`);
}

function diagnoseSession(metrics) {
  const m = deriveMetrics(metrics);
  const notes = [];
  if (m.exposure != null && m.exposure < 10000) {
    notes.push({ level: "warn", area: "流量入口", text: "曝光偏低，优先看预热、封面、标题和平台推荐入口。" });
  }
  if (m.avgWatchMinutes != null && m.avgWatchMinutes < 5) {
    notes.push({ level: "risk", area: "内容承接", text: "平均停留低，说明开场或主线承接弱，周会应复盘前 5 分钟。" });
  }
  if (m.avgWatchMinutes != null && m.avgWatchMinutes >= 12 && m.payConversionRate != null && m.payConversionRate < 3) {
    notes.push({ level: "warn", area: "货盘转化", text: "停留够但支付转化低，优先检查货盘匹配、信任引爆点和购买路径。" });
  }
  if (m.productClickRate != null && m.productClickRate < 18) {
    notes.push({ level: "warn", area: "看货兴趣", text: "商品点击/浏览率偏低，说明内容到货盘的过渡还不够顺。" });
  }
  if (m.refundRate != null && m.refundRate > 15) {
    notes.push({ level: "risk", area: "退款风险", text: "退款率偏高，周会要拆退款商品、承诺边界和售后解释。" });
  }
  if (m.gmv != null && m.gmv > 20000 && m.fans != null && m.fans < 20) {

}

async function unpackFiles(files){
  const workbooks=[],errors=[];
  for(const f of files){
    if(/\.zip$/i.test(f.name)){
      try{
        const zip=await JSZip.loadAsync(await f.arrayBuffer());
        for(const p in zip.files){
          const zf=zip.files[p],base=p.split('/').pop();
          if(zf.dir||p.includes('__MACOSX')||base.startsWith('._')||base.startsWith('~$')||!/\.xlsx?$/i.test(base))continue;
          if(/抽奖|通讯信息|中奖用户/.test(base)){errors.push(base+' 已跳过：含抽奖/通讯信息');continue}
          try{workbooks.push(readWorkbook(base,await zf.async('arraybuffer'),f.name))}
          catch(e){errors.push(base+' 读取失败：'+e.message)}
        }
      }catch(e){errors.push(f.name+' 解压失败：'+e.message)}
    }else if(/\.xlsx?$/i.test(f.name)){
      if(/抽奖|通讯信息|中奖用户/.test(f.name)){errors.push(f.name+' 已跳过：含抽奖/通讯信息');continue}
      try{workbooks.push(readWorkbook(f.name,await f.arrayBuffer(),f.name))}
      catch(e){errors.push(f.name+' 读取失败：'+e.message)}
    }
  }
  return{workbooks,errors};
}
function readWorkbook(name,buf,container){
  const wb=XLSX.read(buf,{type:'array'});
  const sheets=Object.fromEntries(wb.SheetNames.map(n=>[n,XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,defval:null})]));
  return{name,container,sheets};
}

  const reads=sumBy(list,'reads'), viewers=sumBy(list,'viewers'), paid=sumBy(list,'paidAmount'), best=[...list].sort((a,b)=>(b.paidAmount||0)-(a.paidAmount||0))[0];

function leadNoteHighlights(sessions){const groups=topLeadNotesBySession(sessions,5);return groups.length?groups.map(group=>'<div class="rank-session"><div class="rank-head"><div class="rank-title">'+streamTitle(group.session)+'</div><div class="rank-meta">Top '+group.rows.length+' / 共 '+group.total+' 条</div></div><div class="rank-summary">内容前三：'+esc(group.rows.slice(0,3).map((n,i)=>(i+1)+'. '+noteName(n)).join('、'))+'</div>'+leadNoteRankRows(group.rows,group.maxValue,group.rankField)+'</div>').join(''):'<div class="empty">暂无可排行的引流笔记</div>'}
function leadNoteRankRows(rows,max,rankField){return rows.map((n,i)=>'<div class="rank-row lead-rank-row"><div><div class="lead-title"><span class="rank-no">'+(i+1)+'</span>'+esc(noteName(n))+'</div><div class="lead-date">'+esc(n.publishedAt||'')+'</div></div><div class="bar"><i style="width:'+barWidth(n,rankField,max)+'%"></i></div><div class="rank-value">'+rankValue(n,rankField)+'</div><div class="rank-sub">'+fmt(n.viewCount)+'观播</div><div class="rank-sub">'+fmt(n.reads)+'读</div></div>').join('')}
function noteName(note){return note.title||note.noteId||'未命名内容'}
function barWidth(row,field,max){return Math.max(2,((Number(row[field])||0)/Math.max(1,max))*100)}
function rankValue(row,field){if(field==='paidAmount')return money(row.paidAmount);if(field==='viewers')return fmt(row.viewers)+'人';if(field==='viewCount')return fmt(row.viewCount)+'次';if(field==='reads')return fmt(row.reads)+'读';return fmt(row[field])}
function leadNoteTable(list){return'<table><thead><tr><th>平台</th><th>场次</th><th>标题</th><th>发布时间</th><th>阅读</th><th>引流观播</th><th>引流看播人数</th><th>引流成交</th><th>支付件数</th><th>阅读-观播</th><th>观看-支付</th><th>来源表</th></tr></thead><tbody>'+list.map(n=>'<tr><td>'+platformBadge(n.session.platform)+'</td><td>'+streamTitle(n.session)+'</td><td>'+esc(n.title||n.noteId)+'</td><td>'+esc(n.publishedAt)+'</td><td>'+fmt(n.reads)+'</td><td>'+fmt(n.viewCount)+'</td><td>'+fmt(n.viewers)+'</td><td>'+money(n.paidAmount)+'</td><td>'+fmt(n.paidUnits)+'</td><td>'+pct(n.readToViewRate)+'</td><td>'+pct(n.viewToPayConversionRate)+'</td><td>'+esc((n.sourceSheet||'').split(' / ').pop())+'</td></tr>').join('')+'</tbody></table>'}

function recognizedSheetList(s){return (s.importReport.recognizedSheets||[]).map(x=>'<span class="badge info">'+esc(({basic:'基本信息',core:'核心指标',product:'商品',traffic:'流量',audience:'人群',lead_note:'引流笔记'}[x.kind]||x.kind))+' · '+esc(x.sheet.split(' / ').pop())+(x.rows?' · '+x.rows+'行':'')+'</span>').join('')}
function breakdownCounts(s){return '<span class="badge">商品 '+(s.breakdowns?.products?.length||s.products?.length||0)+'</span><span class="badge">流量 '+(s.breakdowns?.traffic?.length||s.trafficSources?.length||0)+'</span><span class="badge">人群 '+(s.breakdowns?.audience?.length||s.audienceSegments?.length||0)+'</span><span class="badge">引流笔记 '+(s.breakdowns?.leadNotes?.length||s.leadNotes?.length||0)+'</span>'}
function topicAuditView(s){

function buildMeetingScript(list){const g=sumMetric(list,'gmv'), v=sumMetric(list,'viewers'), b=sumMetric(list,'buyers'), best=[...list].sort((a,b)=>(b.metrics.gmv||0)-(a.metrics.gmv||0))[0];return ['1. 本周导入 '+list.length+' 场直播，总 GMV '+money(g)+'，总看播 UV '+fmt(v)+'，支付人数 '+fmt(b)+'，整体支付转化 '+pct(v?b/v*100:null)+'。','2. 最高成交场是 '+(best?.basicInfo?.startTime||best?.streamId||'--')+'，GMV '+money(best?.metrics.gmv)+'，平均停留 '+fmt(best?.metrics.avgWatchMinutes)+' 分。','3. 复盘顺序建议：先看流量入口，再看停留承接，再看商品点击/浏览，最后看支付与退款。','4. 下周动作不要只说“提高 GMV”，要指定：哪条流量入口、哪段开场话术、哪个主推商品、哪个退款风险。']}
